<!-- Script Integrasi Webhook n8n -->
    <script>
        const WEBHOOK_URL = 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/beuna-api';
        
        // State Management Sederhana
        let products = [];
        let cart = [];
        let selectedPaymentMethod = 'cash'; // Default cash

        // Fungsi Universal untuk hit Webhook n8n
        async function fetchBeunaAPI(action, payload = {}) {
            try {
                // Notifikasi Loading sederhana (bisa diganti dengan UI Spinner nanti)
                console.log(`Mengirim aksi: ${action}...`);
                
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...payload })
                });
                
                return await response.json();
            } catch (error) {
                console.error(`Error pada API (${action}):`, error);
                alert("Koneksi ke server gagal. Coba lagi.");
                return null;
            }
        }

        // 1. Fungsi Ambil Menu dari n8n
        async function loadMenu() {
            const data = await fetchBeunaAPI('get_menu');
            if (data && data.length > 0) {
                products = data;
                renderMenu();
            }
        }

        // 2. Fungsi Render Menu ke HTML
        function renderMenu() {
            const grid = document.querySelector('.grid');
            grid.innerHTML = ''; // Kosongkan grid statis

            products.forEach(product => {
                // Lewati jika is_active false (jika Anda pakai kolom ini)
                if(product.IS_ACTIVE === false || product.IS_ACTIVE === "false") return; 

                const div = document.createElement('div');
                div.className = 'bg-white rounded-2xl p-4 shadow-sm hover:shadow-lg border border-transparent hover:border-appleRed/20 transition cursor-pointer group flex flex-col justify-between h-48';
                div.onclick = () => addToCart(product);
                
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="bg-red-50 text-appleRed p-2 rounded-xl">
                            <i class="fa-solid fa-mug-hot text-xl"></i>
                        </div>
                        <span class="opacity-0 group-hover:opacity-100 text-appleRed transition"><i class="fa-solid fa-plus-circle text-xl"></i></span>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg leading-tight mb-1">${product.NAME}</h3>
                        <p class="text-gray-500 text-sm font-medium">Rp ${product.PRICE.toLocaleString('id-ID')}</p>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        // 3. Fungsi Tambah ke Keranjang
        function addToCart(product) {
            const existingItem = cart.find(item => item.product_name === product.NAME);
            
            if (existingItem) {
                existingItem.quantity += 1;
                existingItem.subtotal = existingItem.quantity * parseInt(product.PRICE);
            } else {
                cart.push({
                    product_name: product.NAME,
                    quantity: 1,
                    subtotal: parseInt(product.PRICE)
                });
            }
            renderCart();
        }

        // 4. Fungsi Render Keranjang & Subtotal
        function renderCart() {
            const cartList = document.querySelector('.overflow-y-auto.p-6.space-y-5');
            const subtotalText = document.querySelectorAll('.font-bold.text-appleRed, .font-bold:not(.text-appleRed)');
            
            cartList.innerHTML = ''; // Kosongkan list
            let totalAmount = 0;

            cart.forEach((item, index) => {
                totalAmount += item.subtotal;
                
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between';
                div.innerHTML = `
                    <div class="flex-1">
                        <h4 class="font-semibold text-sm">${item.product_name}</h4>
                        <p class="text-appleRed font-medium text-sm">Rp ${item.subtotal.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-3 bg-appleGray rounded-full px-2 py-1">
                        <button onclick="updateQuantity(${index}, -1)" class="w-6 h-6 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-500 hover:text-appleRed"><i class="fa-solid fa-minus text-xs"></i></button>
                        <span class="text-sm font-bold w-4 text-center">${item.quantity}</span>
                        <button onclick="updateQuantity(${index}, 1)" class="w-6 h-6 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-500 hover:text-appleRed"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                `;
                cartList.appendChild(div);
            });

            // Update text total di bawah
            document.querySelector('.p-6.bg-white > div:nth-child(1) > span:nth-child(2)').innerText = `Rp ${totalAmount.toLocaleString('id-ID')}`;
            document.querySelector('.text-2xl.font-black.text-appleRed').innerText = `Rp ${totalAmount.toLocaleString('id-ID')}`;
        }

        // 5. Fungsi Update Kuantitas
        function updateQuantity(index, change) {
            cart[index].quantity += change;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1); // Hapus jika 0
            } else {
                // Recalculate subtotal (cari harga asli dari products list)
                const originalProduct = products.find(p => p.NAME === cart[index].product_name);
                cart[index].subtotal = cart[index].quantity * parseInt(originalProduct.PRICE);
            }
            renderCart();
        }

        // 6. Fungsi Checkout (Kirim ke n8n)
        async function checkout() {
            const customerName = document.getElementById('customerName').value;
            
            if (cart.length === 0) {
                return alert("Keranjang masih kosong!");
            }
            if (!customerName) {
                return alert("Masukkan nama customer terlebih dahulu!");
            }

            const totalAmount = cart.reduce((sum, item) => sum + item.subtotal, 0);

            // Ganti tombol bayar jadi loading state
            const btnPay = document.querySelector('button.w-full.bg-appleRed');
            const originalBtnText = btnPay.innerHTML;
            btnPay.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            btnPay.disabled = true;

            // Hit Webhook untuk Insert Order
            const result = await fetchBeunaAPI('create_order', {
                customer_name: customerName,
                cashier_id: "KASIR_01", // Nanti diganti dinamis saat fitur login siap
                total_amount: totalAmount,
                order_items: cart
            });

            if (result) {
                // Opsional: Langsung tandai lunas (update_payment) jika kasir langsung nerima duit
                // Namun untuk MVP ini, pesanan masuk n8n sudah cukup.
                alert("Pesanan Berhasil Disimpan!");
                
                // Reset State
                cart = [];
                document.getElementById('customerName').value = '';
                renderCart();
            }

            // Kembalikan tombol
            btnPay.innerHTML = originalBtnText;
            btnPay.disabled = false;
        }

        // Binding Tombol Bayar
        document.querySelector('button.w-full.bg-appleRed').addEventListener('click', checkout);

        // Jalankan saat aplikasi pertama dibuka
        window.onload = loadMenu;

    </script>
