<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir - Beuna Rakan Warkop</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                    colors: {
                        appleGray: '#F5F5F7',
                        appleDark: '#1D1D1F',
                        appleRed: '#FF3B30',
                        appleRedHover: '#E3332A'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
    </style>
</head>
<body class="bg-appleGray text-appleDark h-screen flex overflow-hidden antialiased selection:bg-appleRed selection:text-white">

    <main class="flex-1 flex flex-col h-full">
        <header class="flex justify-between items-center px-8 py-6 bg-white/60 backdrop-blur-md border-b border-gray-100 z-10">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Adun Kupi</h1>
                <p class="text-sm text-gray-500 font-medium">Dashboard Kasir</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" placeholder="Cari minuman..." class="bg-gray-100 placeholder-gray-400 text-sm rounded-full pl-10 pr-4 py-2 w-64 focus:outline-none focus:ring-2 focus:ring-appleRed/50 transition">
                </div>
                <div class="h-10 w-10 bg-gradient-to-tr from-appleRed to-red-400 rounded-full flex items-center justify-center text-white font-bold shadow-md cursor-pointer">
                    K1
                </div>
            </div>
        </header>

        <div class="px-8 py-4 flex gap-3 overflow-x-auto">
            <button class="bg-appleDark text-white px-5 py-1.5 rounded-full text-sm font-semibold shadow-sm">Semua</button>
            <button class="bg-white text-gray-600 hover:text-appleRed px-5 py-1.5 rounded-full text-sm font-semibold shadow-sm border border-gray-100 transition">Kopi</button>
            <button class="bg-white text-gray-600 hover:text-appleRed px-5 py-1.5 rounded-full text-sm font-semibold shadow-sm border border-gray-100 transition">Non-Kopi</button>
        </div>

        <div class="flex-1 overflow-y-auto px-8 pb-8 pt-2">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="menu-grid">
                <div class="col-span-full text-center text-gray-400 py-10">
                    <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
                    <p>Memuat menu dari server...</p>
                </div>
            </div>
        </div>
    </main>

    <aside class="w-96 bg-white h-full shadow-[-10px_0_30px_rgba(0,0,0,0.03)] flex flex-col z-20 relative">
        <div class="p-6 border-b border-gray-100">
            <h2 class="text-xl font-bold mb-4">Rincian Pesanan</h2>
            <div class="relative">
                <i class="fa-regular fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="customerName" placeholder="Nama Customer" class="w-full bg-appleGray rounded-xl pl-10 pr-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-appleRed/50 transition border border-transparent focus:border-appleRed/30">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-5" id="cart-list">
            <p class="text-center text-gray-400 text-sm mt-10">Keranjang masih kosong</p>
        </div>

        <div class="p-6 bg-white border-t border-gray-100">
            <div class="flex bg-appleGray p-1 rounded-xl mb-6">
                <button class="flex-1 bg-white shadow-sm rounded-lg py-2 text-sm font-bold text-appleDark">Cash</button>
                <button class="flex-1 rounded-lg py-2 text-sm font-bold text-gray-500 hover:text-appleDark transition">Transfer</button>
            </div>
            <div class="flex items-center justify-between mb-4">
                <span class="text-lg font-bold">Total</span>
                <span class="text-2xl font-black text-appleRed" id="total-price">Rp 0</span>
            </div>
            <button id="btn-checkout" class="w-full bg-appleRed hover:bg-appleRedHover text-white rounded-2xl py-4 font-bold text-lg shadow-lg shadow-appleRed/30 transition transform active:scale-95 flex justify-center items-center gap-2">
                <i class="fa-solid fa-check-circle"></i> Bayar Sekarang
            </button>
        </div>
    </aside>

    <script>
        const WEBHOOK_URL = 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/beuna-api';
        
        let products = [];
        let cart = [];

        async function fetchBeunaAPI(action, payload = {}) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...payload })
                });
                return await response.json();
            } catch (error) {
                console.error(`Error pada API (${action}):`, error);
                return null;
            }
        }

        async function loadMenu() {
            const data = await fetchBeunaAPI('get_menu');
            if (data && data.length > 0) {
                products = data;
                renderMenu();
            } else {
                document.getElementById('menu-grid').innerHTML = '<p class="text-red-500 col-span-full">Gagal memuat menu atau menu kosong.</p>';
            }
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = ''; 

            products.forEach(product => {
                if(product.IS_ACTIVE === false || product.IS_ACTIVE === "false") return; 

                const div = document.createElement('div');
                div.className = 'bg-white rounded-2xl p-4 shadow-sm hover:shadow-lg border border-transparent hover:border-appleRed/20 transition cursor-pointer group flex flex-col justify-between h-48';
                div.onclick = () => addToCart(product);
                
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="bg-red-50 text-appleRed p-2 rounded-xl">
                            <i class="fa-solid fa-mug-hot text-xl"></i>
                        </div>
                        <span class="opacity-0 group-hover:opacity-100 text-appleRed transition"><i class="fa-solid fa-plus-circle text-xl"></i></span>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg leading-tight mb-1">${product.NAME || 'Minuman'}</h3>
                        <p class="text-gray-500 text-sm font-medium">Rp ${parseInt(product.PRICE || 0).toLocaleString('id-ID')}</p>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function addToCart(product) {
            const existingItem = cart.find(item => item.product_name === product.NAME);
            const price = parseInt(product.PRICE || 0);
            
            if (existingItem) {
                existingItem.quantity += 1;
                existingItem.subtotal = existingItem.quantity * price;
            } else {
                cart.push({
                    product_name: product.NAME,
                    quantity: 1,
                    subtotal: price
                });
            }
            renderCart();
        }

        function renderCart() {
            const cartList = document.getElementById('cart-list');
            const totalText = document.getElementById('total-price');
            
            if(cart.length === 0) {
                cartList.innerHTML = '<p class="text-center text-gray-400 text-sm mt-10">Keranjang masih kosong</p>';
                totalText.innerText = 'Rp 0';
                return;
            }

            cartList.innerHTML = ''; 
            let totalAmount = 0;

            cart.forEach((item, index) => {
                totalAmount += item.subtotal;
                
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between';
                div.innerHTML = `
                    <div class="flex-1">
                        <h4 class="font-semibold text-sm">${item.product_name}</h4>
                        <p class="text-appleRed font-medium text-sm">Rp ${item.subtotal.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-3 bg-appleGray rounded-full px-2 py-1">
                        <button onclick="updateQuantity(${index}, -1)" class="w-6 h-6 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-500 hover:text-appleRed"><i class="fa-solid fa-minus text-xs"></i></button>
                        <span class="text-sm font-bold w-4 text-center">${item.quantity}</span>
                        <button onclick="updateQuantity(${index}, 1)" class="w-6 h-6 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-500 hover:text-appleRed"><i class="fa-solid fa-plus text-xs"></i></button>
                    </div>
                `;
                cartList.appendChild(div);
            });

            totalText.innerText = `Rp ${totalAmount.toLocaleString('id-ID')}`;
        }

        // Ekspos fungsi ke global scope agar bisa dipanggil onclick dari HTML inline
        window.updateQuantity = function(index, change) {
            cart[index].quantity += change;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            } else {
                const originalProduct = products.find(p => p.NAME === cart[index].product_name);
                cart[index].subtotal = cart[index].quantity * parseInt(originalProduct.PRICE);
            }
            renderCart();
        }

        async function checkout() {
            const customerName = document.getElementById('customerName').value;
            
            if (cart.length === 0) return alert("Keranjang masih kosong!");
            if (!customerName) return alert("Masukkan nama customer terlebih dahulu!");

            const totalAmount = cart.reduce((sum, item) => sum + item.subtotal, 0);

            const btnPay = document.getElementById('btn-checkout');
            const originalBtnText = btnPay.innerHTML;
            btnPay.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
            btnPay.disabled = true;

            const result = await fetchBeunaAPI('create_order', {
                customer_name: customerName,
                cashier_id: "KASIR_01", 
                total_amount: totalAmount,
                order_items: cart
            });

            if (result) {
                alert("Pesanan Berhasil Disimpan!");
                cart = [];
                document.getElementById('customerName').value = '';
                renderCart();
            } else {
                alert("Gagal menyimpan pesanan ke n8n.");
            }

            btnPay.innerHTML = originalBtnText;
            btnPay.disabled = false;
        }

        document.getElementById('btn-checkout').addEventListener('click', checkout);
        window.onload = loadMenu;
    </script>
</body>
</html>
