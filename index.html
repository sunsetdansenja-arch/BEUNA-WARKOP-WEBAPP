<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUPICASH - UNIVERSAL GATEWAY</title>
    
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/BEUNA-WARKOP-WEBAPP/main/logo%20kupicash.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'Arial Black', 'sans-serif'],
                        display: ['"Archivo Black"', 'Impact', 'sans-serif'],
                    },
                    colors: {
                        neoOrange: '#FF5000',
                        neoGreen: '#39FF14',
                        neoBlack: '#111111',
                        neoWhite: '#FFFFFF',
                        neoGray: '#E5E5E5'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #FF5000; }
        
        .border-neo { border: 4px solid #111111; }
        .border-neo-b { border-bottom: 4px solid #111111; }
        
        .shadow-neo { box-shadow: 8px 8px 0px #111111; }
        .shadow-neo-sm { box-shadow: 4px 4px 0px #111111; }
        
        /* Brutalist Interaction */
        .btn-neo {
            transition: all 0.1s ease-out;
            cursor: pointer;
        }
        .btn-neo:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px #111111;
        }
        .btn-neo:active {
            transform: translate(8px, 8px) !important;
            box-shadow: 0px 0px 0px #111111 !important;
        }

        .hidden-view { display: none !important; }
    </style>
</head>
<body class="text-neoBlack h-screen w-screen overflow-hidden antialiased flex flex-col items-center justify-center relative">

    <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#111 2px, transparent 2px); background-size: 30px 30px;"></div>

    <div class="bg-neoWhite p-10 w-[500px] border-neo shadow-neo relative z-10 text-center">
        
        <div class="flex justify-center mb-8">
            <img src="https://raw.githubusercontent.com/sunsetdansenja-arch/BEUNA-WARKOP-WEBAPP/main/logo%20kupicash.png" alt="KUPICASH" class="w-48 h-auto border-neo shadow-neo-sm object-cover bg-neoOrange">
        </div>

        <div class="bg-neoBlack text-neoGreen border-neo py-2 mb-8 font-display tracking-widest text-sm flex justify-center items-center gap-2">
            <div class="w-2 h-2 bg-neoGreen rounded-full animate-pulse"></div>
            SELECT ACCESS LEVEL
        </div>

        <div class="space-y-5">
            <button onclick="bypassLogin('CASHIER', 'kasir.html')" class="w-full bg-neoWhite border-neo p-5 shadow-neo btn-neo flex items-center justify-between group">
                <div class="text-left">
                    <h2 class="font-display text-2xl uppercase">STAFF POS</h2>
                    <p class="text-sm font-bold text-neoGray-500 uppercase mt-1">> Layar Kasir & Transaksi</p>
                </div>
                <div class="w-12 h-12 bg-neoBlack text-neoWhite flex items-center justify-center border-neo-sm text-xl group-hover:bg-neoOrange transition-colors">
                    <i class="fa-solid fa-cash-register"></i>
                </div>
            </button>

            <button onclick="bypassLogin('OWNER', 'owner.html')" class="w-full bg-neoGreen border-neo p-5 shadow-neo btn-neo flex items-center justify-between group">
                <div class="text-left">
                    <h2 class="font-display text-2xl uppercase">OWNER PANEL</h2>
                    <p class="text-sm font-bold text-neoBlack uppercase mt-1">> Analytics & Manajemen</p>
                </div>
                <div class="w-12 h-12 bg-neoBlack text-neoWhite flex items-center justify-center border-neo-sm text-xl group-hover:bg-neoWhite group-hover:text-neoBlack transition-colors">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
            </button>

            <button onclick="bypassLogin('DEVELOPER', 'developer.html')" class="w-full bg-neoBlack text-neoWhite border-neo p-5 shadow-neo btn-neo flex items-center justify-between group">
                <div class="text-left">
                    <h2 class="font-display text-2xl uppercase text-neoGreen">SUPER ADMIN</h2>
                    <p class="text-sm font-bold uppercase mt-1">> Deploy Warkop Baru</p>
                </div>
                <div class="w-12 h-12 bg-neoGreen text-neoBlack flex items-center justify-center border-neo-sm text-xl border-neoWhite">
                    <i class="fa-solid fa-terminal"></i>
                </div>
            </button>
        </div>

    </div>

    <div class="absolute bottom-6 bg-neoBlack text-neoWhite px-4 py-2 border-neo shadow-neo font-bold text-xs uppercase z-10 tracking-widest">
        ⚠️ DEV MODE ACTIVE: NO AUTHENTICATION REQUIRED
    </div>

    <script>
        // Fungsi Bypass Login untuk Testing
        function bypassLogin(role, targetPage) {
            // Kita buat data "Dummy" agar halaman tujuan tidak memblokir akses
            const dummyState = {
                tenant: 'ADUNKUPI',      // Hardcode ke tenant test Anda
                username: 'TEST_' + role, 
                role: role
            };
            
            // Simpan ke localStorage seolah-olah user baru saja login dengan sukses
            localStorage.setItem('kupiState', JSON.stringify(dummyState));
            
            // Lempar ke halaman tujuan
            window.location.href = targetPage;
        }

        // Hapus state lama saat halaman gateway ini dibuka (Reset)
        window.onload = () => {
            localStorage.removeItem('kupiState');
        };
    </script>
</body>
</html>
